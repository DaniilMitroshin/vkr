services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: vkr
      POSTGRES_USER: vkr
      POSTGRES_PASSWORD: vkr
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vkr -d vkr"]
      interval: 5s
      timeout: 3s
      retries: 20

  app:
    build: .
    environment:
      HTTP_ADDR: :8080
      DATABASE_DSN: postgres://vkr:vkr@postgres:5432/vkr?sslmode=disable
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      ADMIN_TELEGRAM_IDS: ${ADMIN_TELEGRAM_IDS:-}
      APP_TIMEZONE: ${APP_TIMEZONE:-Europe/Moscow}
      SEED_ON_START: ${SEED_ON_START:-false}
      SEED_STUDENTS_FILE: ${SEED_STUDENTS_FILE:-}
      SEED_CHOICES_FILE: ${SEED_CHOICES_FILE:-}
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8080:8080"

volumes:
  postgres_data:
